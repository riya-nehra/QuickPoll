<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote — QuickPoll</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .main { flex: 1; padding: 48px 24px; }
    .poll-question {
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 32px;
    }
    .options-list { display: flex; flex-direction: column; gap: 12px; }
    .option-label {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.95rem;
    }
    .option-label:hover { border-color: var(--accent); }
    .option-label.locked { cursor: default; }
    .option-label.locked:hover { border-color: var(--border); }
    .option-label input[type="radio"] { display: none; }
    .option-label.selected {
      border-color: var(--accent);
      background: rgba(109,255,135,0.06);
      color: var(--accent);
    }
    .radio-circle {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .selected .radio-circle {
      border-color: var(--accent);
      background: var(--accent);
    }
    .selected .radio-circle::after {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #0d0d0f;
    }
    .option-label.correct {
      border-color: var(--accent);
      background: rgba(109,255,135,0.12);
      color: var(--accent);
    }
    .option-label.incorrect {
      border-color: var(--accent2);
      background: rgba(255,107,107,0.12);
      color: var(--accent2);
    }
    .answer-feedback {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .answer-feedback.correct {
      display: block;
      background: rgba(109,255,135,0.1);
      color: var(--accent);
      border: 1px solid rgba(109,255,135,0.25);
    }
    .answer-feedback.incorrect {
      display: block;
      background: rgba(255,107,107,0.1);
      color: var(--accent2);
      border: 1px solid rgba(255,107,107,0.25);
    }
    .already-voted {
      text-align: center;
      padding: 40px 20px;
    }
    .already-voted-icon { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav container">
      <a href="/" class="nav-logo">Quick<span>Poll</span></a>
      <div class="nav-actions" id="navActions"></div>
    </nav>

    <main class="main">
      <div class="container">
        <div id="loadingEl"><div class="spinner"></div></div>
        <div id="errorEl" class="msg msg-error" style="display:none"></div>

        <!-- Already voted -->
        <div id="alreadyVoted" class="card fade-in already-voted" style="display:none">
          <div class="already-voted-icon">✅</div>
          <h2 class="page-title" style="font-size:1.4rem">You've already voted!</h2>
          <p class="text-muted mt-2">You can still watch the live results.</p>
          <a id="resultsLinkVoted" href="#" class="btn btn-primary mt-4">View Results →</a>
        </div>

        <!-- Poll card -->
        <div id="pollCard" style="display:none" class="fade-in">
          <div class="card">
            <div class="badge mb-2">📊 Open Poll</div>
            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 12px;" id="creatorInfo"></p>
            <div id="categoryTagsInfo" style="margin-bottom: 16px;"></div>
            <h1 class="poll-question" id="pollQuestion"></h1>

            <div class="options-list" id="optionsList"></div>
            <div id="answerFeedback" class="answer-feedback"></div>

            <div id="voteError" class="msg msg-error mt-3" style="display:none"></div>

            <button class="btn btn-primary btn-lg w-full mt-4" id="voteBtn" disabled>
              Submit Vote
            </button>
          </div>

          <p class="text-muted text-center mt-3" style="font-size:0.82rem">
            Your vote is anonymous · one vote per device
          </p>
          <div class="text-center mt-3">
            <a id="resultsLink" href="#" class="btn btn-ghost">View live results →</a>
          </div>
        </div>

        <!-- Voted success -->
        <div id="votedCard" class="card fade-in" style="display:none; text-align:center">
          <div style="font-size:2.5rem; margin-bottom:12px">🗳️</div>
          <h2 class="page-title" style="font-size:1.5rem">Vote submitted!</h2>
          <p class="text-muted mt-2">Thanks for voting. See how the results are looking.</p>
          <a id="resultsLinkAfter" href="#" class="btn btn-primary btn-lg mt-4">
            View Live Results →
          </a>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { getPoll, submitVote } from './polls.js';
    import { onAuthChange } from './auth.js';

    const params = new URLSearchParams(location.search);
    const pollId = params.get('id');

    if (!pollId) {
      showError('No poll ID provided. <a href="/">Go home</a>');
    } else {
      init();
    }

    onAuthChange((user) => {
      const nav = document.getElementById('navActions');
      nav.innerHTML = user
        ? `<a href="/dashboard.html" class="btn btn-ghost">My Polls</a>`
        : `<a href="/dashboard.html" class="btn btn-ghost">Sign In</a>`;
    });

    async function init() {
      const poll = await getPoll(pollId);
      document.getElementById('loadingEl').style.display = 'none';

      if (!poll) { showError('Poll not found.'); return; }

      // Duplicate vote check (localStorage)
      const votedKey = `qp_voted_${pollId}`;
      if (localStorage.getItem(votedKey)) {
        document.getElementById('alreadyVoted').style.display = 'block';
        document.querySelector('#alreadyVoted h2').textContent =
          poll.pollType === 'quiz' ? 'You already answered this quiz!' : "You've already voted!";
        document.getElementById('resultsLinkVoted').href = `/results.html?id=${pollId}`;
        return;
      }

      // Set results link
      document.getElementById('resultsLink').href = `/results.html?id=${pollId}`;

      // Render poll
      document.getElementById('pollQuestion').textContent = poll.question;
      
      // Display creator info
      const creatorInfo = document.getElementById('creatorInfo');
      if (poll.creatorName) {
        creatorInfo.textContent = `👤 Created by ${poll.creatorName}`;
      } else {
        creatorInfo.textContent = '👤 Created by Anonymous';
      }
      
      // Display category and tags
      const categoryTagsInfo = document.getElementById('categoryTagsInfo');
      let infoHtml = '';
      if (poll.category) {
        infoHtml += `<span style="display: inline-block; background: rgba(109,255,135,0.1); border: 1px solid rgba(109,255,135,0.3); color: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-right: 8px;">${escapeHtml(poll.category)}</span>`;
      }
      if (poll.tags && poll.tags.length > 0) {
        infoHtml += poll.tags.map(tag => `<span style="display: inline-block; background: rgba(109,255,135,0.08); border: 1px solid rgba(109,255,135,0.2); color: var(--accent); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; margin-right: 6px; font-weight: 500;">#${escapeHtml(tag)}</span>`).join('');
      }
      if (infoHtml) {
        categoryTagsInfo.innerHTML = infoHtml;
      }
      
      const list = document.getElementById('optionsList');
      const isQuiz = poll.pollType === 'quiz';
      const voteBtn = document.getElementById('voteBtn');
      const answerFeedback = document.getElementById('answerFeedback');
      let selectedKey = null;
      let answerLocked = false;

      document.querySelector('.badge').textContent = isQuiz ? 'Quiz Question' : 'Open Poll';
      voteBtn.style.display = isQuiz ? 'none' : 'inline-flex';

      Object.entries(poll.options).forEach(([key, opt]) => {
        const label = document.createElement('label');
        label.className = 'option-label';
        label.dataset.optionKey = key;
        label.innerHTML = `
          <input type="radio" name="poll_option" value="${key}" />
          <span class="radio-circle"></span>
          <span>${escapeHtml(opt.text)}</span>
        `;
        label.addEventListener('click', async () => {
          if (answerLocked) return;
          document.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
          label.classList.add('selected');
          selectedKey = key;
          voteBtn.disabled = false;

          if (isQuiz) {
            answerLocked = true;
            answerLocked = await submitQuizAnswer(poll, selectedKey, votedKey, answerFeedback);
          }
        });
        list.appendChild(label);
      });

      document.getElementById('pollCard').style.display = 'block';

      // Submit vote
      document.getElementById('voteBtn').addEventListener('click', async () => {
        if (!selectedKey) return;
        voteBtn.disabled = true;
        voteBtn.textContent = 'Submitting...';

        try {
          await submitVote(pollId, selectedKey);
          localStorage.setItem(votedKey, '1');
          document.getElementById('pollCard').style.display = 'none';
          const after = document.getElementById('votedCard');
          after.style.display = 'block';
          document.getElementById('resultsLinkAfter').href = `/results.html?id=${pollId}`;
        } catch (e) {
          document.getElementById('voteError').style.display = 'block';
          document.getElementById('voteError').textContent = 'Vote failed. Please try again.';
          voteBtn.disabled = false;
          voteBtn.textContent = 'Submit Vote';
        }
      });
    }

    async function submitQuizAnswer(poll, selectedKey, votedKey, answerFeedback) {
      document.getElementById('voteError').style.display = 'none';
      document.querySelectorAll('.option-label').forEach(label => {
        label.classList.add('locked');
      });

      try {
        await submitVote(pollId, selectedKey);
        localStorage.setItem(votedKey, selectedKey);

        const correctKey = poll.correctOptionKey;
        const correctText = poll.options[correctKey]?.text || 'the correct answer';
        const isCorrect = selectedKey === correctKey;

        document.querySelectorAll('.option-label').forEach(label => {
          const key = label.dataset.optionKey;
          if (key === correctKey) label.classList.add('correct');
          if (key === selectedKey && !isCorrect) label.classList.add('incorrect');
        });

        answerFeedback.className = `answer-feedback ${isCorrect ? 'correct' : 'incorrect'}`;
        answerFeedback.innerHTML = isCorrect
          ? 'Correct answer.'
          : `Wrong answer. Correct answer: <strong>${escapeHtml(correctText)}</strong>`;
        return true;
      } catch (e) {
        document.getElementById('voteError').style.display = 'block';
        document.getElementById('voteError').textContent = 'Answer failed. Please try again.';
        document.querySelectorAll('.option-label').forEach(label => {
          label.classList.remove('locked', 'selected');
        });
        return false;
      }
    }

    function showError(msg) {
      document.getElementById('loadingEl').style.display = 'none';
      const el = document.getElementById('errorEl');
      el.innerHTML = msg;
      el.style.display = 'block';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
