<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a Poll — QuickPoll</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .main { flex: 1; padding: 48px 24px; }
    .page-title {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-row { display: flex; gap: 10px; align-items: center; }
    .option-row .form-input { flex: 1; }
    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 40px; height: 40px;
      border-radius: var(--radius);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .remove-btn:hover { color: var(--accent2); border-color: var(--accent2); }
    .add-option-btn {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 11px;
      width: 100%;
      font-size: 0.88rem;
      transition: all var(--transition);
    }
    .add-option-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Success state */
    .success-card { text-align: center; display: none; }
    .success-icon { font-size: 3rem; margin-bottom: 16px; }
    .share-box {
      display: flex; gap: 8px; margin-top: 16px;
    }
    .share-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav container">
      <a href="/" class="nav-logo">Quick<span>Poll</span></a>
      <div class="nav-actions" id="navActions">
        <a href="/signin.html" class="btn btn-outline" id="signInBtn">Sign In</a>
        <a href="/signup.html" class="btn btn-primary" id="signUpBtn">Sign Up</a>
        <a href="/dashboard.html" class="btn btn-primary" id="dashboardBtn" style="display:none">Dashboard</a>
        <button class="btn btn-outline" id="logoutBtn" style="display:none">Logout</button>
      </div>
    </nav>

    <main class="main">
      <div class="container">

        <!-- Create form -->
        <div id="createForm" class="fade-in">
          <h1 class="page-title">Create a poll</h1>
          <p class="text-muted mt-1">Fill in your question and options below.</p>

          <div class="card mt-4">
            <div id="formError" class="msg msg-error mt-2" style="display:none"></div>

            <div class="form-group">
              <label class="form-label" for="question">Your question</label>
              <input
                type="text"
                id="question"
                class="form-input"
                placeholder="e.g. What's the best pizza topping?"
                maxlength="200"
              />
            </div>

            <div class="form-group mt-3">
              <label class="form-label">Options</label>
              <div class="options-list" id="optionsList">
                <div class="option-row">
                  <input type="text" class="form-input option-input" placeholder="Option 1" maxlength="100" />
                </div>
                <div class="option-row">
                  <input type="text" class="form-input option-input" placeholder="Option 2" maxlength="100" />
                </div>
              </div>
              <button class="add-option-btn mt-2" id="addOptionBtn">+ Add another option</button>
            </div>

            <div id="authNote" class="msg msg-success mt-3" style="display:none">
              ✓ Signed in — this poll will be saved to your dashboard.
            </div>

            <button class="btn btn-primary btn-lg w-full mt-4" id="createBtn">
              Create Poll
            </button>
          </div>
        </div>

        <!-- Success state -->
        <div id="successCard" class="card fade-in success-card mt-4">
          <div class="success-icon">🎉</div>
          <h2 class="page-title" style="font-size:1.5rem">Poll created!</h2>
          <p class="text-muted mt-1">Share this link to start collecting votes.</p>
          <div class="share-box">
            <input type="text" id="shareUrl" class="share-input" readonly />
            <button class="btn btn-primary" id="copyBtn">Copy</button>
          </div>
          <a id="viewResultsLink" href="#" class="btn btn-outline w-full mt-3" style="justify-content:center">
            View Results →
          </a>
          <a href="/create.html" class="btn btn-ghost w-full mt-2" style="justify-content:center">
            Create another poll
          </a>
        </div>

      </div>
    </main>
  </div>

  <script type="module">
    import { createPoll } from './polls.js';
    import { currentUser as getCurrentUser, ensureUserProfile, onAuthChange, logOut } from './auth.js';

    let currentUser = null;
    let currentUserProfile = null;
    let optionCount = 2;
    const MAX_OPTIONS = 5;

    const signInBtn = document.getElementById('signInBtn');
    const signUpBtn = document.getElementById('signUpBtn');
    const dashboardBtn = document.getElementById('dashboardBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    onAuthChange(async (user) => {
      currentUser = user;
      const note = document.getElementById('authNote');
      if (user) {
        signInBtn.style.display = 'none';
        signUpBtn.style.display = 'none';
        dashboardBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'inline-block';
        note.style.display = 'block';
        try {
          currentUserProfile = await ensureUserProfile(user);
        } catch (error) {
          currentUserProfile = null;
          console.error('Failed to load user profile on create page:', error);
        }
      } else {
        currentUserProfile = null;
        signInBtn.style.display = 'inline-block';
        signUpBtn.style.display = 'inline-block';
        dashboardBtn.style.display = 'none';
        logoutBtn.style.display = 'none';
        note.style.display = 'none';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await logOut();
        window.location.href = '/';
      } catch (error) {
        console.error('Logout error:', error);
      }
    });

    // Add option
    document.getElementById('addOptionBtn').addEventListener('click', () => {
      if (optionCount >= MAX_OPTIONS) return;
      optionCount++;
      const list = document.getElementById('optionsList');
      const row = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `
        <input type="text" class="form-input option-input" placeholder="Option ${optionCount}" maxlength="100" />
        <button class="remove-btn" title="Remove">✕</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => {
        row.remove();
        optionCount--;
        if (optionCount >= MAX_OPTIONS) {
          document.getElementById('addOptionBtn').style.display = 'none';
        } else {
          document.getElementById('addOptionBtn').style.display = 'block';
        }
      });
      list.appendChild(row);
      if (optionCount >= MAX_OPTIONS) {
        document.getElementById('addOptionBtn').style.display = 'none';
      }
    });

    // Create poll
    document.getElementById('createBtn').addEventListener('click', async () => {
      const btn = document.getElementById('createBtn');
      const errEl = document.getElementById('formError');
      errEl.style.display = 'none';

      const question = document.getElementById('question').value.trim();
      const options = [...document.querySelectorAll('.option-input')]
        .map(i => i.value.trim())
        .filter(Boolean);

      if (!question) { showError('Please enter a question.'); return; }
      if (options.length < 2) { showError('Please enter at least 2 options.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating…';

      try {
        const effectiveUser = currentUser || getCurrentUser();
        if (effectiveUser && !currentUserProfile) {
          currentUserProfile = await ensureUserProfile(effectiveUser);
        }

        const creatorName = currentUserProfile ? currentUserProfile.username : null;
        const pollId = await createPoll({
          question,
          options,
          creatorId: effectiveUser ? effectiveUser.uid : null,
          creatorName: creatorName,
        });

        const shareUrl = `${location.origin}/vote.html?id=${pollId}`;
        document.getElementById('shareUrl').value = shareUrl;
        document.getElementById('viewResultsLink').href = `/results.html?id=${pollId}`;

        document.getElementById('createForm').style.display = 'none';
        const card = document.getElementById('successCard');
        card.style.display = 'block';
      } catch (e) {
        showError('Failed to create poll. Check your Firebase config.');
        console.error(e);
        btn.disabled = false;
        btn.textContent = 'Create Poll';
      }

      function showError(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    });

    // Copy link
    document.getElementById('copyBtn').addEventListener('click', () => {
      const input = document.getElementById('shareUrl');
      navigator.clipboard.writeText(input.value);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  </script>
</body>
</html>
