<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create a Poll — QuickPoll</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .main { flex: 1; padding: 48px 24px; }
    .page-title {
      font-family: var(--font-head);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .type-option input { display: none; }
    .type-card {
      display: block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .type-card strong {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }
    .type-card span {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.4;
    }
    .type-option input:checked + .type-card {
      border-color: var(--accent);
      background: rgba(109,255,135,0.08);
    }
    .option-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 10px; align-items: center; }
    .option-row .form-input { flex: 1; }
    .correct-choice {
      display: none;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }
    .quiz-mode .correct-choice { display: inline-flex; }
    .correct-choice input { accent-color: var(--accent); }
    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 40px; height: 40px;
      border-radius: var(--radius);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .remove-btn:hover { color: var(--accent2); border-color: var(--accent2); }
    .add-option-btn {
      background: none;
      border: 1px dashed var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 11px;
      width: 100%;
      font-size: 0.88rem;
      transition: all var(--transition);
    }
    .add-option-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Success state */
    .success-card { text-align: center; display: none; }
    .success-icon { font-size: 3rem; margin-bottom: 16px; }
    .share-box {
      display: flex; gap: 8px; margin-top: 16px;
    }
    .share-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      outline: none;
    }
    @media (max-width: 560px) {
      .option-row { grid-template-columns: 1fr auto; }
      .correct-choice { grid-column: 1 / -1; }
      .type-toggle { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav container">
      <a href="/" class="nav-logo">Quick<span>Poll</span></a>
      <div class="nav-actions" id="navActions">
        <a href="/signin.html" class="btn btn-outline" id="signInBtn">Sign In</a>
        <a href="/signup.html" class="btn btn-primary" id="signUpBtn">Sign Up</a>
        <a href="/dashboard.html" class="btn btn-primary" id="dashboardBtn" style="display:none">Dashboard</a>
        <button class="btn btn-outline" id="logoutBtn" style="display:none">Logout</button>
      </div>
    </nav>

    <main class="main">
      <div class="container">

        <!-- Create form -->
        <div id="createForm" class="fade-in">
          <h1 class="page-title">Create a poll</h1>
          <p class="text-muted mt-1">Fill in your question and options below.</p>

          <div class="card mt-4">
            <div id="formError" class="msg msg-error mt-2" style="display:none"></div>

            <div class="form-group">
              <label class="form-label">Create type</label>
              <div class="type-toggle">
                <label class="type-option">
                  <input type="radio" name="pollType" value="poll" checked />
                  <span class="type-card">
                    <strong>Normal poll</strong>
                    <span>People vote and see live results.</span>
                  </span>
                </label>
                <label class="type-option">
                  <input type="radio" name="pollType" value="quiz" />
                  <span class="type-card">
                    <strong>Quiz question</strong>
                    <span>Mark one correct answer.</span>
                  </span>
                </label>
              </div>
            </div>

            <div class="form-group mt-3">
              <label class="form-label" for="question">Your question</label>
              <input
                type="text"
                id="question"
                class="form-input"
                placeholder="e.g. What's the best pizza topping?"
                maxlength="200"
              />
            </div>

            <div class="form-group mt-3">
              <label class="form-label" for="category">Category</label>
              <select id="category" class="form-input">
                <option value="Other">Other</option>
                <option value="Political">Political</option>
                <option value="Food">Food</option>
                <option value="Education">Education</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Sports">Sports</option>
                <option value="Technology">Technology</option>
                <option value="Health">Health</option>
                <option value="Travel">Travel</option>
              </select>
            </div>

            <div class="form-group mt-3">
              <label class="form-label" for="timeLimit">Time Limit</label>
              <select id="timeLimit" class="form-input">
                <option value="none">No time limit</option>
                <option value="hour">1 Hour</option>
                <option value="day">1 Day</option>
                <option value="month">1 Month</option>
                <option value="year">1 Year</option>
              </select>
            </div>

            <div class="form-group mt-3">
              <label class="form-label" for="tags">Tags (optional)</label>
              <input
                type="text"
                id="tags"
                class="form-input"
                placeholder="e.g. #trending #urgent #fun (comma separated)"
                maxlength="200"
              />
              <p class="text-muted" style="font-size: 0.8rem; margin-top: 4px;">Separate tags with commas</p>
            </div>

            <div class="form-group mt-3">
              <label class="form-label">Options</label>
              <div class="options-list" id="optionsList">
                <div class="option-row">
                  <input type="text" class="form-input option-input" placeholder="Option 1" maxlength="100" />
                  <label class="correct-choice"><input type="radio" name="correctOption" value="0" /> Correct</label>
                </div>
                <div class="option-row">
                  <input type="text" class="form-input option-input" placeholder="Option 2" maxlength="100" />
                  <label class="correct-choice"><input type="radio" name="correctOption" value="1" /> Correct</label>
                </div>
              </div>
              <button class="add-option-btn mt-2" id="addOptionBtn">+ Add another option</button>
            </div>

            <div id="authNote" class="msg msg-success mt-3" style="display:none">
              ✓ Signed in — this poll will be saved to your dashboard.
            </div>

            <button class="btn btn-primary btn-lg w-full mt-4" id="createBtn">
              Create Poll
            </button>
          </div>
        </div>

        <!-- Success state -->
        <div id="successCard" class="card fade-in success-card mt-4">
          <div class="success-icon">🎉</div>
          <h2 class="page-title" style="font-size:1.5rem">Poll created!</h2>
          <p class="text-muted mt-1">Share this link to start collecting votes.</p>
          <div class="share-box">
            <input type="text" id="shareUrl" class="share-input" readonly />
            <button class="btn btn-primary" id="copyBtn">Copy</button>
          </div>
          <a id="viewResultsLink" href="#" class="btn btn-outline w-full mt-3" style="justify-content:center">
            View Results →
          </a>
          <a href="/create.html" class="btn btn-ghost w-full mt-2" style="justify-content:center">
            Create another poll
          </a>
        </div>

      </div>
    </main>
  </div>

  <script type="module">
    import { createPoll } from './polls.js';
    import { currentUser as getCurrentUser, ensureUserProfile, onAuthChange, logOut } from './auth.js';

    let currentUser = null;
    let currentUserProfile = null;
    let optionCount = 2;
    const MAX_OPTIONS = 5;

    const signInBtn = document.getElementById('signInBtn');
    const signUpBtn = document.getElementById('signUpBtn');
    const dashboardBtn = document.getElementById('dashboardBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const optionsList = document.getElementById('optionsList');

    document.querySelectorAll('input[name="pollType"]').forEach((input) => {
      input.addEventListener('change', () => {
        optionsList.classList.toggle('quiz-mode', getPollType() === 'quiz');
      });
    });

    onAuthChange(async (user) => {
      currentUser = user;
      const note = document.getElementById('authNote');
      if (user) {
        signInBtn.style.display = 'none';
        signUpBtn.style.display = 'none';
        dashboardBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'inline-block';
        note.style.display = 'block';
        try {
          currentUserProfile = await ensureUserProfile(user);
        } catch (error) {
          currentUserProfile = null;
          console.error('Failed to load user profile on create page:', error);
        }
      } else {
        currentUserProfile = null;
        signInBtn.style.display = 'inline-block';
        signUpBtn.style.display = 'inline-block';
        dashboardBtn.style.display = 'none';
        logoutBtn.style.display = 'none';
        note.style.display = 'none';
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await logOut();
        window.location.href = '/';
      } catch (error) {
        console.error('Logout error:', error);
      }
    });

    // Add option
    document.getElementById('addOptionBtn').addEventListener('click', () => {
      if (optionCount >= MAX_OPTIONS) return;
      optionCount++;
      const list = document.getElementById('optionsList');
      const row = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `
        <input type="text" class="form-input option-input" placeholder="Option ${optionCount}" maxlength="100" />
        <label class="correct-choice"><input type="radio" name="correctOption" value="${optionCount - 1}" /> Correct</label>
        <button class="remove-btn" title="Remove">✕</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => {
        row.remove();
        optionCount--;
        refreshOptionIndexes();
        if (optionCount >= MAX_OPTIONS) {
          document.getElementById('addOptionBtn').style.display = 'none';
        } else {
          document.getElementById('addOptionBtn').style.display = 'block';
        }
      });
      list.appendChild(row);
      if (optionCount >= MAX_OPTIONS) {
        document.getElementById('addOptionBtn').style.display = 'none';
      }
      refreshOptionIndexes();
    });

    // Create poll
    document.getElementById('createBtn').addEventListener('click', async () => {
      const btn = document.getElementById('createBtn');
      const errEl = document.getElementById('formError');
      errEl.style.display = 'none';

      const question = document.getElementById('question').value.trim();
      const pollType = getPollType();
      const optionRows = [...document.querySelectorAll('.option-row')]
        .map((row) => ({
          text: row.querySelector('.option-input').value.trim(),
          correct: row.querySelector('input[name="correctOption"]').checked,
        }))
        .filter(option => option.text);
      const options = optionRows.map(option => option.text);
      const correctOptionIndex = optionRows.findIndex(option => option.correct);
      const correctOptionKey = correctOptionIndex >= 0 ? `option_${correctOptionIndex}` : null;

      if (!question) { showError('Please enter a question.'); return; }
      if (options.length < 2) { showError('Please enter at least 2 options.'); return; }
      if (pollType === 'quiz' && !correctOptionKey) { showError('Please mark the correct answer for this quiz.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating…';

      try {
        const effectiveUser = currentUser || getCurrentUser();
        if (effectiveUser && !currentUserProfile) {
          currentUserProfile = await ensureUserProfile(effectiveUser);
        }

        const creatorName = currentUserProfile ? currentUserProfile.username : null;
        const category = document.getElementById('category').value;
        const timeLimit = document.getElementById('timeLimit').value;
        const tagsInput = document.getElementById('tags').value.trim();
        const tags = tagsInput 
          ? tagsInput.split(',').map(t => t.trim().replace(/^#/, '')).filter(Boolean)
          : [];
        const pollId = await createPoll({
          question,
          options,
          category,
          tags,
          timeLimit,
          pollType,
          correctOptionKey,
          creatorId: effectiveUser ? effectiveUser.uid : null,
          creatorName: creatorName,
        });

        const shareUrl = `${location.origin}/vote.html?id=${pollId}`;
        document.getElementById('shareUrl').value = shareUrl;
        document.getElementById('viewResultsLink').href = `/results.html?id=${pollId}`;

        document.getElementById('createForm').style.display = 'none';
        const card = document.getElementById('successCard');
        card.style.display = 'block';
      } catch (e) {
        console.error(e);
        showError(getCreateErrorMessage(e));
        btn.disabled = false;
        btn.textContent = 'Create Poll';
      }

      function showError(msg) {
        errEl.textContent = msg;
        errEl.style.display = 'block';
      }
    });

    // Copy link
    document.getElementById('copyBtn').addEventListener('click', () => {
      const input = document.getElementById('shareUrl');
      navigator.clipboard.writeText(input.value);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });

    function getPollType() {
      return document.querySelector('input[name="pollType"]:checked').value;
    }

    function refreshOptionIndexes() {
      [...document.querySelectorAll('.option-row')].forEach((row, index) => {
        row.querySelector('.option-input').placeholder = `Option ${index + 1}`;
        row.querySelector('input[name="correctOption"]').value = String(index);
      });
    }

    function getCreateErrorMessage(error) {
      if (error?.code === 'permission-denied') {
        return 'Firestore rules rejected this quiz. Publish the updated firestore.rules file in Firebase Console, then try again.';
      }
      return error?.message
        ? `Failed to create poll: ${error.message}`
        : 'Failed to create poll. Check your Firebase config.';
    }
  </script>
</body>
</html>
