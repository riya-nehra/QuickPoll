<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — QuickPoll</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo a {
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
    }
    .auth-logo span { color: var(--accent); }
    .auth-title {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .auth-sub a { color: var(--accent); text-decoration: none; }
    .auth-sub a:hover { text-decoration: underline; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      transition: border-color var(--transition);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .btn-full { width: 100%; }
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span { padding: 0 16px; }
    .error-msg {
      background: rgba(255,82,82,0.1);
      border: 1px solid rgba(255,82,82,0.3);
      color: #ff5252;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/">Quick<span>Poll</span></a>
      </div>
      <h1 class="auth-title">Create an account</h1>
      <p class="auth-sub">Already have an account? <a href="/signin.html">Sign in</a></p>
      
      <div class="error-msg" id="errorMsg"></div>
      
      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required placeholder="Choose a username" minlength="3" maxlength="20" />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="At least 6 characters" minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Sign Up</button>
      </form>
      
      <div class="divider"><span>or</span></div>
      
      <button type="button" class="btn btn-outline btn-full" id="googleBtn">
        Continue with Google
      </button>
    </div>
  </div>

  <script type="module">
    import { createUserProfile, ensureUserProfile, googleSignIn, signUp } from './auth.js';

    const form = document.getElementById('signupForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const googleBtn = document.getElementById('googleBtn');

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }

    function clearError() {
      errorMsg.classList.remove('show');
    }

    // Email/Password Sign Up
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      
      const username = form.username.value.trim();
      const email = form.email.value.trim();
      const password = form.password.value;
      const confirmPassword = form.confirmPassword.value;

      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }

      submitBtn.textContent = 'Creating account...';
      submitBtn.disabled = true;

      try {
        const userCredential = await signUp(email, password);
        await createUserProfile(userCredential.user, username);
        window.location.href = '/dashboard.html';
      } catch (error) {
        console.error('Signup error:', error);
        showError(getErrorMessage(error.code));
        submitBtn.textContent = 'Sign Up';
        submitBtn.disabled = false;
      }
    });

    // Google Sign In
    googleBtn.addEventListener('click', async () => {
      googleBtn.textContent = 'Signing in...';
      googleBtn.disabled = true;
      clearError();

      try {
        const userCredential = await googleSignIn();
        const preferredUsername = form.username.value.trim();
        await ensureUserProfile(userCredential.user, preferredUsername);
        window.location.href = '/dashboard.html';
      } catch (error) {
        console.error('Google signup error:', error);
        showError(getErrorMessage(error.code));
        googleBtn.textContent = 'Continue with Google';
        googleBtn.disabled = false;
      }
    });

    function getErrorMessage(code) {
      switch (code) {
        case 'auth/email-already-in-use':
          return 'This email is already registered';
        case 'auth/invalid-email':
          return 'Invalid email address';
        case 'auth/weak-password':
          return 'Password should be at least 6 characters';
        case 'auth/popup-closed-by-user':
          return 'Sign up was cancelled';
        default:
          return 'Failed to create account. Please try again.';
      }
    }
  </script>
</body>
</html>
